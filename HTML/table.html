<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML Demo - Table, Form, List</title>
</head>
<body>
    <h1>Sanya Khare</h1>
    <h2>TCA2357045</h2>   
    <h1>HTML Demo Page</h1>
    <h2>List Example</h2>
    <h3>Ordered List</h3>
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>
    <h3>Unordered List</h3>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
    </ul>
    <h2>Table Example</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>Satwik</td>
            <td>22</td>
            <td>B.Tech</td>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>23</td>
            <td>MCA</td>
        </tr>
    </table>
    <h2>Form Example</h2>
    <form>
        Name: <input type="text" name="name"><br><br>
        Email: <input type="email" name="email"><br><br>
        Gender:
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>
        Course:
        <select>
            <option>B.Tech</option>
            <option>MCA</option>
            <option>BCA</option>
        </select><br><br>
        Message:<br>
        <textarea rows="4" cols="30"></textarea><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
